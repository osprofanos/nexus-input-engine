<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus Input Engine — dashboard</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--muted:#8b949e;
        --eng:#7c9cff;--con:#7ee787;--per:#d2a8ff;--chip:#21262d}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
       font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.4}
  header{padding:24px 28px;border-bottom:1px solid var(--border)}
  h1{margin:0;font-size:20px}
  .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .wrap{padding:20px 28px;max-width:1200px;margin:0 auto}
  .tiles{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px}
  .tile{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:120px}
  .tile .n{font-size:22px;font-weight:600}
  .tile .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:820px){.board{grid-template-columns:1fr}}
  .col{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
  .col h2{margin:0 0 10px;font-size:14px;display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%}
  .eng .dot{background:var(--eng)} .con .dot{background:var(--con)} .per .dot{background:var(--per)}
  .card{border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:9px;background:#0f141b}
  .card a{color:var(--fg);text-decoration:none;font-weight:500}
  .card a:hover{text-decoration:underline}
  .meta{color:var(--muted);font-size:12px;margin-top:5px}
  .chips{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap}
  .chip{background:var(--chip);border:1px solid var(--border);border-radius:20px;padding:1px 9px;font-size:11px;color:var(--muted)}
  .empty{color:var(--muted);font-size:13px;font-style:italic}
  footer{color:var(--muted);font-size:12px;padding:16px 28px;border-top:1px solid var(--border);margin-top:8px}
  code{background:var(--chip);padding:1px 5px;border-radius:5px}
</style>
</head>
<body>
<header>
  <h1>Nexus Input Engine</h1>
  <div class="sub" id="sub">Priority board</div>
</header>
<div class="wrap">
  <div class="tiles" id="tiles"></div>
  <div class="board" id="board"></div>
</div>
<footer>
  Generated by <code>refresh_dashboard.py</code> (DATA) + <code>dashboard_rank.py</code> (RANK).
  Adopt up to your weekly cap with <code>engine/adopt.py</code>.
</footer>

<script>
const DATA = {};
const RANK = [];
/* END RANK */

(function () {
  const GROUPS = [
    { key: "engines", label: "Engines", cls: "eng" },
    { key: "content", label: "Content", cls: "con" },
    { key: "pessoal", label: "Personal", cls: "per" },
  ];
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  // --- summary tiles from DATA (guarded — DATA may be {} before refresh_dashboard runs) ---
  const tiles = [];
  if (DATA && typeof DATA.total_fichas === "number")
    tiles.push(["Fichas", DATA.total_fichas]);
  if (DATA && typeof DATA.n_collections === "number")
    tiles.push(["Collections", DATA.n_collections]);
  if (DATA && DATA.axes)
    for (const ax of Object.keys(DATA.axes)) tiles.push([ax, DATA.axes[ax]]);
  if (typeof RANK !== "undefined")
    tiles.push(["In RANK", RANK.length]);
  document.getElementById("tiles").innerHTML = tiles.map(([l, n]) =>
    `<div class="tile"><div class="n">${esc(n)}</div><div class="l">${esc(l)}</div></div>`).join("");

  if (DATA && DATA.generated_at)
    document.getElementById("sub").textContent = "Priority board · data as of " + esc(DATA.generated_at);

  // --- board from RANK (grouped) ---
  const byGroup = { engines: [], content: [], pessoal: [] };
  (RANK || []).forEach((it) => { (byGroup[it.group] || (byGroup[it.group] = [])).push(it); });

  document.getElementById("board").innerHTML = GROUPS.map((g) => {
    const items = byGroup[g.key] || [];
    const cards = items.length ? items.map((it) => {
      const title = esc(it.title || it.id || "(untitled)");
      const link = it.url ? `<a href="${esc(it.url)}" target="_blank" rel="noopener">${title}</a>` : title;
      const chips = (it.projects || []).map((p) => `<span class="chip">${esc(p)}</span>`).join("");
      return `<div class="card">${link}
        <div class="meta">${esc(it.id)}${it.collection ? " · " + esc(it.collection) : ""}</div>
        <div class="chips">${chips}</div></div>`;
    }).join("") : `<div class="empty">No candidates yet.</div>`;
    return `<div class="col ${g.cls}"><h2><span class="dot"></span>${esc(g.label)}</h2>${cards}</div>`;
  }).join("");
})();
</script>
</body>
</html>
